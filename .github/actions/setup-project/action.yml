name: 'Setup Project'
description: >
  Composite action that installs the requested Node version, restores the
  npm cache, and runs `npm ci`. Think of this as a "function" you can call
  from any job so you don't repeat the same steps in every workflow file.
  NOTE: this does NOT check out the repo. GitHub has to read this file off
  disk to know what the action even is, so the calling job must run
  actions/checkout BEFORE calling this action - a composite action can't
  check out the code that contains itself.

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash
